<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Page</title>
    <style>
        /* Basic styling - Aap isay apni marzi se design kar sakte hain */
        body { 
            font-family: sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: #f4f4f4; 
            margin: 0;
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            text-align: center; 
            width: 90%;
            max-width: 350px;
        }
        button { 
            padding: 12px 20px; 
            background: #000; /* Dark black theme jo aapko pasand hai */
            color: #d4af37; /* Gold color ka text */
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            margin-top: 15px;
        }
        #loading { 
            display: none; 
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- Loading Text (Jab check ho raha ho aur direct link open ho) -->
    <div id="loading">Loading...</div>

    <!-- Signup Form -->
    <div class="container" id="signup-box">
        <h2>Welcome</h2>
        <p>Aage barhne ke liye Sign Up karein.</p>
        
        <!-- Aap yahan inputs bhi daal sakte hain agar zaroorat ho -->
        <!-- <input type="text" placeholder="Name" /> -->
        
        <button onclick="handleSignup()">Sign Up</button>
    </div>

    <script>
        // 1. YAHAN APNA LINK DAALEIN
        const targetLink = "https://aapka-link-yahan-dalen.com";

        // 2. Jab page load ho, check karein ke user pehle aa chuka hai?
        window.onload = function() {
            if (localStorage.getItem("isSignedUp") === "true") {
                // Agar true hai, to signup box chupayen aur direct link khol dein
                document.getElementById("signup-box").style.display = "none";
                document.getElementById("loading").style.display = "block";
                window.location.href = targetLink;
            }
        };

        // 3. Signup button click hone par kya hoga?
        function handleSignup() {
            // LocalStorage mein yaad rakh len ke user ne signup kar liya hai
            localStorage.setItem("isSignedUp", "true");
            
            // User ko us link par bhej dein
            window.location.href = targetLink;
        }
    </script>
</body>
</html>
