<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Sign Up</title>
    <style>
        /* Dark Black & Gold Theme */
        body { 
            font-family: sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: #0a0a0a; 
            margin: 0; 
            color: #ffffff; 
        }
        .container { 
            background: #1a1a1a; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2); 
            text-align: center; 
            width: 85%;
            max-width: 350px; 
            border: 1px solid #d4af37; 
        }
        h2 { 
            color: #d4af37; /* Gold */
            margin-bottom: 5px;
        }
        p {
            font-size: 14px;
            color: #aaaaaa;
            margin-bottom: 20px;
        }
        input { 
            width: 90%; 
            padding: 12px; 
            margin-top: 10px; 
            border: 1px solid #333; 
            border-radius: 6px; 
            background: #2a2a2a; 
            color: white; 
            font-size: 15px;
        }
        input:focus {
            outline: none;
            border-color: #d4af37;
        }
        button { 
            padding: 14px 20px; 
            background: linear-gradient(135deg, #d4af37, #aa8529); 
            color: #000; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            margin-top: 20px;
            transition: 0.3s;
        }
        button:disabled { 
            background: #555; 
            cursor: not-allowed; 
            color: #888;
        }
        #loading { 
            display: none; 
            font-size: 20px;
            font-weight: bold; 
            color: #d4af37; 
        }
    </style>
</head>
<body>

    <div id="loading">Loading...</div>

    <div class="container" id="signup-box">
        <h2>Sign Up</h2>
        <p>App use karne ke liye details darj karein</p>
        
        <input type="text" id="userName" placeholder="Aapka Naam" required />
        <input type="email" id="userEmail" placeholder="Aapka Email" required />
        
        <button id="submitBtn" onclick="handleSignup()">Continue</button>
    </div>

    <script>
        // 1. YAHAN APNA EMAIL DAALEIN JAHAN DETAILS CHAHIYE
        const adminEmail = "aapka.email@gmail.com"; 

        // 2. YAHAN APNA TARGET LINK DAALEIN
        const targetLink = "https://aapka-link-yahan-dalen.com";

        window.onload = function() {
            if (localStorage.getItem("isSignedUp") === "true") {
                document.getElementById("signup-box").style.display = "none";
                document.getElementById("loading").style.display = "block";
                window.location.href = targetLink;
            }
        };

        function handleSignup() {
            const name = document.getElementById("userName").value;
            const email = document.getElementById("userEmail").value;
            const btn = document.getElementById("submitBtn");

            // Agar inputs khali hain to aage mat barhein
            if(name === "" || email === "") {
                alert("Baraye meharbani apna naam aur email likhein.");
                return;
            }

            btn.innerText = "Processing...";
            btn.disabled = true;

            // FormSubmit ke zariye email par data bhejna (Bina page refresh kiye)
            fetch(`https://formsubmit.co/ajax/${adminEmail}`, {
                method: "POST",
                headers: { 
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify({
                    Name: name,
                    Email: email,
                    Message: "Naya User Sign Up!"
                })
            })
            .then(response => response.json())
            .then(data => {
                // Email chali gayi, ab browser ko bata dein ke signup ho chuka hai
                localStorage.setItem("isSignedUp", "true");
                
                // User ko asal link par bhej dein
                window.location.href = targetLink;
            })
            .catch(error => {
                alert("Koi masla aa gaya, apna internet connection check karein.");
                btn.innerText = "Continue";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
