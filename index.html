<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Installation Error</title>

<style>
    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #0a0a0a;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: white;
    }

    .container {
        text-align: center;
        padding: 40px;
        border-radius: 15px;
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(10px);
        box-shadow: 0 0 20px #00f0ff, 0 0 40px #00f0ff inset;
        animation: glow 2s infinite alternate;
        max-width: 400px;
    }

    @keyframes glow {
        from {
            box-shadow: 0 0 10px #00f0ff, 0 0 20px #00f0ff inset;
        }
        to {
            box-shadow: 0 0 25px #00f0ff, 0 0 60px #00f0ff inset;
        }
    }

    h1 {
        margin-bottom: 15px;
        font-size: 26px;
        color: #00f0ff;
        text-shadow: 0 0 10px #00f0ff;
    }

    p {
        font-size: 16px;
        color: #ccc;
        margin-bottom: 25px;
    }

    .btn {
        display: inline-block;
        padding: 12px 25px;
        border-radius: 25px;
        border: none;
        background: #00f0ff;
        color: black;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0 0 10px #00f0ff;
    }

    .btn:hover {
        background: #00c3cc;
        box-shadow: 0 0 20px #00f0ff;
    }
</style>
</head>

<body>

<div class="container">
    <h1>Installation Incomplete</h1>
    <p>
        It appears that the application was not installed correctly.  
        Please reinstall the app properly to continue.
    </p>
    <button class="btn" onclick="location.reload()">Retry</button>
</div>

</body>
</html>
