  <meta charset="UTF-8" />

:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --border: #1e1e1e;
  --accent: #ff3c3c;
  --accent2: #ff8c00;
  --text: #f0f0f0;
  --muted: #666;
  --card: #161616;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Animated background grid */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,60,60,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,60,60,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  z-index: 0;
  pointer-events: none;
}

.container {
  position: relative;
  z-index: 1;
  max-width: 760px;
  margin: 0 auto;
  padding: 60px 20px 100px;
}

/* HEADER */
header {
  text-align: center;
  margin-bottom: 56px;
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(64px, 12vw, 110px);
  letter-spacing: 4px;
  line-height: 0.9;
  background: linear-gradient(135deg, #ff3c3c 0%, #ff8c00 60%, #ffcc00 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 12px;
  animation: fadeSlideDown 0.7s cubic-bezier(.22,1,.36,1) both;
}

.tagline {
  color: var(--muted);
  font-size: 14px;
  letter-spacing: 3px;
  text-transform: uppercase;
  font-weight: 300;
  animation: fadeSlideDown 0.7s 0.1s cubic-bezier(.22,1,.36,1) both;
}

/* PLATFORM BADGES */
.platforms {
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 20px;
  animation: fadeSlideDown 0.7s 0.2s cubic-bezier(.22,1,.36,1) both;
}

.badge {
  padding: 4px 14px;
  border-radius: 100px;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.5px;
  border: 1px solid;
}

.badge-yt  { color: #ff4444; border-color: #ff444444; background: #ff44440d; }
.badge-ig  { color: #e1306c; border-color: #e1306c44; background: #e1306c0d; }
.badge-tt  { color: #69c9d0; border-color: #69c9d044; background: #69c9d00d; }
.badge-tw  { color: #1d9bf0; border-color: #1d9bf044; background: #1d9bf00d; }
.badge-fb  { color: #4267b2; border-color: #4267b244; background: #4267b20d; }

/* SEARCH BOX */
.search-wrap {
  display: flex;
  gap: 0;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  background: var(--surface);
  transition: border-color 0.2s;
  animation: fadeSlideDown 0.7s 0.25s cubic-bezier(.22,1,.36,1) both;
}

.search-wrap:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(255,60,60,0.1);
}

#urlInput {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  padding: 18px 20px;
}

#urlInput::placeholder { color: var(--muted); }

#fetchBtn {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  cursor: pointer;
  color: white;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  letter-spacing: 2px;
  padding: 0 30px;
  transition: opacity 0.2s, transform 0.1s;
  white-space: nowrap;
}

#fetchBtn:hover { opacity: 0.9; }
#fetchBtn:active { transform: scale(0.97); }
#fetchBtn:disabled { opacity: 0.5; cursor: not-allowed; }

/* STATUS */
#status {
  margin-top: 18px;
  text-align: center;
  font-size: 14px;
  color: var(--muted);
  min-height: 20px;
}

.status-error { color: var(--accent) !important; }

/* SPINNER */
.spinner {
  display: inline-block;
  width: 16px; height: 16px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
  margin-right: 8px;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* RESULT CARD */
#result {
  margin-top: 36px;
  display: none;
  animation: fadeUp 0.45s cubic-bezier(.22,1,.36,1) both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes fadeSlideDown {
  from { opacity: 0; transform: translateY(-16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.video-card {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
}

.video-top {
  display: flex;
  gap: 18px;
  padding: 20px;
  align-items: flex-start;
}

.thumb-wrap {
  flex-shrink: 0;
  width: 130px;
  height: 82px;
  border-radius: 8px;
  overflow: hidden;
  background: var(--border);
  position: relative;
}

.thumb-wrap img {
  width: 100%; height: 100%;
  object-fit: cover;
}

.platform-pill {
  position: absolute;
  top: 6px; left: 6px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.5px;
  padding: 2px 8px;
  border-radius: 100px;
  background: rgba(0,0,0,0.75);
  color: #fff;
  backdrop-filter: blur(4px);
}

.video-meta { flex: 1; min-width: 0; }

.video-title {
  font-size: 15px;
  font-weight: 600;
  line-height: 1.4;
  margin-bottom: 6px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.video-info {
  font-size: 12px;
  color: var(--muted);
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

/* FORMAT LIST */
.formats-wrap {
  border-top: 1px solid var(--border);
  padding: 16px 20px 20px;
}

.formats-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--muted);
  margin-bottom: 12px;
}

.formats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 10px;
}

.format-btn {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 2px;
  padding: 12px 14px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  text-decoration: none;
  transition: border-color 0.18s, background 0.18s, transform 0.1s;
}

.format-btn:hover {
  border-color: var(--accent);
  background: rgba(255,60,60,0.06);
  transform: translateY(-1px);
}

.format-btn:active { transform: scale(0.97); }

.fmt-quality {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 1px;
  line-height: 1;
  color: var(--accent);
}

.fmt-detail {
  font-size: 11px;
  color: var(--muted);
}

.fmt-size {
  font-size: 10px;
  color: #444;
  margin-top: 2px;
}

/* DIRECT DL FALLBACK */
.direct-dl {
  margin-top: 14px;
  text-align: center;
}

.direct-dl a {
  color: var(--accent2);
  font-size: 13px;
  text-decoration: none;
  border-bottom: 1px dashed var(--accent2);
  padding-bottom: 1px;
}

/* FOOTER */
footer {
  text-align: center;
  margin-top: 80px;
  color: #2a2a2a;
  font-size: 12px;
}

/* MOBILE */
@media (max-width: 480px) {
  .video-top { flex-direction: column; }
  .thumb-wrap { width: 100%; height: 180px; }
  #fetchBtn { padding: 0 20px; font-size: 16px; }
}

<body>
<div class="container">

  <header>
    <div class="logo">VidSnatch</div>
    <div class="tagline">Paste · Fetch · Download</div>
    <div class="platforms">
      <span class="badge badge-yt">YouTube</span>
      <span class="badge badge-ig">Instagram</span>
      <span class="badge badge-tt">TikTok</span>
      <span class="badge badge-tw">Twitter / X</span>
      <span class="badge badge-fb">Facebook</span>
    </div>
  </header>

  <div class="search-wrap">
    <input
      id="urlInput"
      type="url"
      placeholder="Paste video URL here…"
      autocomplete="off"
      spellcheck="false"
    />
    <button id="fetchBtn">FETCH</button>
  </div>

  <div id="status"></div>

  <div id="result">
    <div class="video-card">
      <div class="video-top">
        <div class="thumb-wrap">
          <img id="thumb" src="" alt="thumbnail" />
          <span class="platform-pill" id="platformPill"></span>
        </div>
        <div class="video-meta">
          <div class="video-title" id="vidTitle"></div>
          <div class="video-info">
            <span id="vidUploader"></span>
            <span id="vidDuration"></span>
          </div>
        </div>
      </div>
      <div class="formats-wrap">
        <div class="formats-label">Choose Quality</div>
        <div class="formats-grid" id="formatsGrid"></div>
        <div class="direct-dl" id="directDl"></div>
      </div>
    </div>
  </div>

</div>

<footer>VidSnatch — for personal use only. Respect content creators.</footer>

<script>
  const btn = document.getElementById('fetchBtn');
  const input = document.getElementById('urlInput');
  const status = document.getElementById('status');
  const result = document.getElementById('result');

  function formatDuration(secs) {
    if (!secs) return '';
    const h = Math.floor(secs / 3600);
    const m = Math.floor((secs % 3600) / 60);
    const s = secs % 60;
    if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    return `${m}:${String(s).padStart(2,'0')}`;
  }

  function formatSize(bytes) {
    if (!bytes) return '';
    if (bytes > 1_000_000) return `~${(bytes/1_000_000).toFixed(0)} MB`;
    if (bytes > 1_000) return `~${(bytes/1_000).toFixed(0)} KB`;
    return `${bytes} B`;
  }

  function setStatus(msg, isError = false) {
    status.innerHTML = msg;
    status.className = isError ? 'status-error' : '';
  }

  async function fetchVideo() {
    const url = input.value.trim();
    if (!url) { setStatus('Please paste a video URL first.', true); return; }

    btn.disabled = true;
    result.style.display = 'none';
    setStatus('<span class="spinner"></span>Fetching video info…');

    try {
      const apiUrl = `/api/download?url=${encodeURIComponent(url)}`;
      const res = await fetch(apiUrl);
      const json = await res.json();

      if (!res.ok || json.error) {
        setStatus(json.error || 'Something went wrong.', true);
        return;
      }

      const d = json.data;

      // Fill card
      document.getElementById('thumb').src = d.thumbnail || '';
      document.getElementById('thumb').onerror = () => {
        document.querySelector('.thumb-wrap').style.background = '#1a1a1a';
      };
      document.getElementById('platformPill').textContent = d.platform;
      document.getElementById('vidTitle').textContent = d.title;
      document.getElementById('vidUploader').textContent = d.uploader ? `@${d.uploader}` : '';
      document.getElementById('vidDuration').textContent = formatDuration(d.duration);

      // Formats
      const grid = document.getElementById('formatsGrid');
      grid.innerHTML = '';

      if (d.formats && d.formats.length > 0) {
        d.formats.forEach(f => {
          const a = document.createElement('a');
          a.className = 'format-btn';
          a.href = f.url;
          a.target = '_blank';
          a.rel = 'noopener';
          a.download = '';

          const quality = f.quality || f.ext.toUpperCase();
          const sizeStr = formatSize(f.filesize);

          a.innerHTML = `
            <span class="fmt-quality">${quality}</span>
            <span class="fmt-detail">.${f.ext} · Download</span>
            ${sizeStr ? `<span class="fmt-size">${sizeStr}</span>` : ''}
          `;
          grid.appendChild(a);
        });
      } else if (d.direct_url) {
        // Fallback: single direct link
        const a = document.createElement('a');
        a.className = 'format-btn';
        a.href = d.direct_url;
        a.target = '_blank';
        a.rel = 'noopener';
        a.innerHTML = `<span class="fmt-quality">BEST</span><span class="fmt-detail">Download</span>`;
        grid.appendChild(a);
      }

      // Direct URL fallback notice
      const directDl = document.getElementById('directDl');
      directDl.innerHTML = d.direct_url
        ? `<a href="${d.direct_url}" target="_blank" rel="noopener">↗ Open direct stream URL</a>`
        : '';

      result.style.display = 'block';
      setStatus('');
    } catch (err) {
      setStatus('Network error. Make sure the API is deployed.', true);
    } finally {
      btn.disabled = false;
    }
  }

  btn.addEventListener('click', fetchVideo);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') fetchVideo(); });
</script>

</body>
