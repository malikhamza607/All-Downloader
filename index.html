<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Trend Analyzer PRO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #0d0d0d;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
            margin-top: 20px;
        }
        header h1 {
            font-size: 2.5rem;
            color: #00f2fe;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
        }
        header p {
            color: #888;
            margin-top: 10px;
            font-size: 1.1rem;
        }
        .container {
            max-width: 500px; /* Thora chota kiya hai takay single card acha lagay */
            width: 100%;
        }
        .card {
            background: #1a1a1a;
            border-radius: 15px;
            padding: 25px;
            border: 1px solid #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            border-color: #fe0979;
        }
        .card h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #fe0979;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
            text-align: center;
        }
        ul {
            list-style: none;
        }
        li {
            background: #222;
            margin-bottom: 10px;
            padding: 12px 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
        }
        .trend-stats {
            color: #00f2fe;
            font-size: 0.9rem;
        }
        .btn-analyze {
            background: linear-gradient(45deg, #00f2fe, #fe0979);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 40px;
            transition: opacity 0.3s;
            box-shadow: 0 0 20px rgba(254, 9, 121, 0.4);
        }
        .btn-analyze:hover {
            opacity: 0.8;
        }
        #loading {
            display: none;
            margin-top: 20px;
            color: #00f2fe;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1>Trend Analyzer PRO</h1>
        <p>Discover Viral TikTok Sounds instantly</p>
    </header>

    <div class="container" id="results" style="opacity: 0.5; pointer-events: none;">
        <!-- Trending Sounds Section -->
        <div class="card">
            <h2>🎵 Viral Sounds</h2>
            <ul id="sound-list">
                <li>Aesthetic Vibe <span class="trend-stats">Data hidden</span></li>
                <li>Phonk Remix <span class="trend-stats">Data hidden</span></li>
                <li>Funny Meme Audio <span class="trend-stats">Data hidden</span></li>
                <li>Slowed + Reverb <span class="trend-stats">Data hidden</span></li>
            </ul>
        </div>
    </div>

    <p id="loading">Analyzing TikTok Algorithms...</p>
    <button class="btn-analyze" onclick="analyzeTrends()">Scan Today's Trends</button>

    <script>
        const sounds = [
            { name: "Sigma Grindset (Remix)", uses: "850K Videos" },
            { name: "Chill Lofi Beats", uses: "1.2M Videos" },
            { name: "Funny Suspense Sound", uses: "500K Videos" },
            { name: "Aesthetic Cinematic", uses: "2.1M Videos" },
            { name: "Sped Up Pop Song", uses: "3.4M Videos" }
        ];

        function analyzeTrends() {
            const btn = document.querySelector('.btn-analyze');
            const loading = document.getElementById('loading');
            const results = document.getElementById('results');
            const soundList = document.getElementById('sound-list');

            btn.style.display = 'none';
            loading.style.display = 'block';

            // Simulating API fetch delay
            setTimeout(() => {
                loading.style.display = 'none';
                results.style.opacity = '1';
                results.style.pointerEvents = 'auto';

                // Update Sounds
                soundList.innerHTML = '';
                sounds.forEach(sound => {
                    soundList.innerHTML += `<li>${sound.name} <span class="trend-stats">${sound.uses}</span></li>`;
                });

            }, 2000); // 2 seconds loading animation
        }
    </script>
</body>
</html>
