<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Video Downloader</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-sizing: border-box;
        }
        h2 {
            margin-bottom: 20px;
            color: #4da6ff;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #333;
            border-radius: 6px;
            background-color: #2a2a2a;
            color: #fff;
            outline: none;
            box-sizing: border-box;
        }
        input[type="text"]:focus {
            border-color: #4da6ff;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #4da6ff;
            color: #121212;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background-color: #3388dd;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
            word-wrap: break-word;
            font-size: 14px;
        }
        .success {
            background-color: #28a74522;
            border: 1px solid #28a745;
        }
        .error {
            background-color: #dc354522;
            border: 1px solid #dc3545;
        }
        a.download-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
        }
        .loader {
            display: none;
            margin-top: 15px;
            font-size: 14px;
            color: #aaaaaa;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Video Downloader</h2>
    <p style="font-size: 13px; color: #888; margin-bottom: 20px;">YouTube, TikTok, aur Instagram links support karta hai</p>
    
    <input type="text" id="videoUrl" placeholder="Video ka link yahan paste karein...">
    <button onclick="fetchVideo()">Get Download Link</button>
    
    <div class="loader" id="loader">Processing... Thora wait karein...</div>
    
    <div class="result" id="resultBox">
        <strong id="videoTitle"></strong><br>
        <a href="#" id="downloadLink" class="download-btn" target="_blank" rel="noopener noreferrer">Download Video</a>
    </div>
</div>

<script>
    async function fetchVideo() {
        const urlInput = document.getElementById('videoUrl').value;
        const resultBox = document.getElementById('resultBox');
        const loader = document.getElementById('loader');
        const videoTitle = document.getElementById('videoTitle');
        const downloadLink = document.getElementById('downloadLink');

        if (!urlInput) {
            alert("Bhai, pehle link to paste karo!");
            return;
        }

        // Zabardast Link Cleaner: Ab yeh `?si=` aur `?igsh=` sab ko theek se udayega
        let cleanUrl = urlInput;
        if (cleanUrl.includes('?')) {
            cleanUrl = cleanUrl.split('?')[0];
        }

        // UI Reset
        resultBox.style.display = 'none';
        resultBox.className = 'result';
        loader.style.display = 'block';

        try {
            const response = await fetch(`/api/download?url=${encodeURIComponent(cleanUrl)}`);
            
            let data;
            try {
                // Ab yeh JSON zaroor read karega chahay error ho
                data = await response.json();
            } catch (e) {
                throw new Error("Vercel Timeout: Video extract karne mein 10 second se zyada lag gaye.");
            }

            loader.style.display = 'none';

            if (data.success) {
                resultBox.classList.add('success');
                videoTitle.innerText = data.title;
                downloadLink.href = data.download_url;
                resultBox.style.display = 'block';
            } else {
                resultBox.classList.add('error');
                videoTitle.innerText = "Error: " + data.error;
                downloadLink.style.display = 'none';
                resultBox.style.display = 'block';
            }
        } catch (error) {
            loader.style.display = 'none';
            resultBox.classList.add('error');
            videoTitle.innerText = error.message;
            downloadLink.style.display = 'none';
            resultBox.style.display = 'block';
        }
    }
</script>

</body>
</html>
