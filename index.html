<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Video Search</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input { width: 70%; padding: 10px; margin-right: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background-color: #0095f6; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0077c5; }
        .result-box { margin-top: 20px; padding: 10px; background: #eee; border-radius: 4px; font-family: monospace; white-space: pre-wrap; word-wrap: break-word; overflow-x: auto;}
    </style>
</head>
<body>

    <div class="container">
        <h2>Instagram Video Search</h2>
        <input type="text" id="searchInput" placeholder="Enter keyword (e.g. cooking)">
        <button onclick="searchVideos()">Search</button>

        <div id="loading" style="display: none; margin-top: 10px;">Data nikal raha hai, please wait...</div>
        
        <div id="results" class="result-box" style="display: none;"></div>
    </div>

    <script>
        async function searchVideos() {
            const query = document.getElementById('searchInput').value;
            if(!query) return alert("Please enter a search term!");

            document.getElementById('loading').style.display = "block";
            document.getElementById('results').style.display = "none";

            try {
                // Vercel backend ko call kar rahe hain
                const response = await fetch(`/api/search?query=${query}`);
                
                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(`Backend Error ${response.status}: ${errText}`);
                }

                const data = await response.json();

                document.getElementById('loading').style.display = "none";
                document.getElementById('results').style.display = "block";
                
                // Data ko format kar ke screen par show karna
                document.getElementById('results').innerText = JSON.stringify(data, null, 2);

            } catch(error) {
                document.getElementById('loading').style.display = "none";
                alert("Error Detail: " + error.message);
            }
        }
    </script>

</body>
</html>
